name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  changes:
    name: Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docs: ${{ steps.classify.outputs.docs }}
      code: ${{ steps.classify.outputs.code }}
      docs_only: ${{ steps.classify.outputs.docs_only }}
      docs_files: ${{ steps.filter.outputs.docs_files }}

    steps:
      - name: Checkout filters
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4

      - name: Detect changed paths
        if: github.event_name == 'pull_request'
        id: filter
        uses: dorny/paths-filter@v4
        with:
          list-files: shell
          filters: .github/filters/ci-paths.yaml

      - name: Classify change scope
        id: classify
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            docs="${{ steps.filter.outputs.docs }}"
            code="${{ steps.filter.outputs.code }}"
          else
            docs="false"
            code="true"
          fi

          echo "docs=$docs" >> "$GITHUB_OUTPUT"
          echo "code=$code" >> "$GITHUB_OUTPUT"

          if [ "$docs" = "true" ] && [ "$code" != "true" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint docs (non-blocking)
        if: needs.changes.outputs.docs_only == 'true'
        shell: bash
        run: |
          set +e
          pnpm exec markdownlint-cli2 ${{ needs.changes.outputs.docs_files }}
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::warning title=Docs lint::markdownlint found issues in changed docs files. This docs-only lint path is non-blocking."
          fi
          exit 0

      - name: Lint repository
        if: needs.changes.outputs.docs_only != 'true'
        run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes

    steps:
      - name: Docs-only shortcut
        if: needs.changes.outputs.docs_only == 'true'
        run: 'echo "Docs-only PR: typecheck skipped by design."'

      - name: Checkout
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: needs.changes.outputs.docs_only != 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        if: needs.changes.outputs.docs_only != 'true'
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        if: needs.changes.outputs.docs_only != 'true'
        run: pnpm typecheck

  test-slices-1:
    name: Test slice ${{ matrix.slice }}/6 (internal)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    strategy:
      fail-fast: false
      matrix:
        slice: [1, 2]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm exec vitest run --reporter=verbose --shard=${{ matrix.slice }}/6

  test-slices-2:
    name: Test slice ${{ matrix.slice }}/6 (internal)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    strategy:
      fail-fast: false
      matrix:
        slice: [3, 4]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm exec vitest run --reporter=verbose --shard=${{ matrix.slice }}/6

  test-slices-3:
    name: Test slice ${{ matrix.slice }}/6 (internal)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    strategy:
      fail-fast: false
      matrix:
        slice: [5, 6]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm exec vitest run --reporter=verbose --shard=${{ matrix.slice }}/6

  test-shard-1:
    name: Test (shard 1/3)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs:
      - changes
      - test-slices-1

    steps:
      - name: Docs-only shortcut
        if: needs.changes.outputs.docs_only == 'true'
        run: 'echo "Docs-only PR: test shard 1/3 skipped by design."'

      - name: Fail on internal slice failure
        if: needs.changes.outputs.docs_only != 'true' && needs.test-slices-1.result != 'success'
        run: exit 1

      - name: Report success
        if: needs.changes.outputs.docs_only != 'true' && needs.test-slices-1.result == 'success'
        run: 'echo "Internal test slices 1/6 and 2/6 passed."'

  test-shard-2:
    name: Test (shard 2/3)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs:
      - changes
      - test-slices-2

    steps:
      - name: Docs-only shortcut
        if: needs.changes.outputs.docs_only == 'true'
        run: 'echo "Docs-only PR: test shard 2/3 skipped by design."'

      - name: Fail on internal slice failure
        if: needs.changes.outputs.docs_only != 'true' && needs.test-slices-2.result != 'success'
        run: exit 1

      - name: Report success
        if: needs.changes.outputs.docs_only != 'true' && needs.test-slices-2.result == 'success'
        run: 'echo "Internal test slices 3/6 and 4/6 passed."'

  test-shard-3:
    name: Test (shard 3/3)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs:
      - changes
      - test-slices-3

    steps:
      - name: Docs-only shortcut
        if: needs.changes.outputs.docs_only == 'true'
        run: 'echo "Docs-only PR: test shard 3/3 skipped by design."'

      - name: Fail on internal slice failure
        if: needs.changes.outputs.docs_only != 'true' && needs.test-slices-3.result != 'success'
        run: exit 1

      - name: Report success
        if: needs.changes.outputs.docs_only != 'true' && needs.test-slices-3.result == 'success'
        run: 'echo "Internal test slices 5/6 and 6/6 passed."'

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build docs
        if: needs.changes.outputs.docs_only == 'true'
        run: pnpm docs:build

      - name: Build workspace
        if: needs.changes.outputs.docs_only != 'true'
        run: pnpm build

  coverage:
    name: Coverage
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - lint
      - typecheck
      - test-shard-1
      - test-shard-2
      - test-shard-3
      - build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Coverage
        run: pnpm test:ci:coverage

  api-smoke:
    name: API Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    env:
      PORT: "3000"
      AUTH_MODE: "off"
      ENABLE_SSE_CHAT: "true"
      ENABLE_PROMPT_DRY_RUN: "true"
      ENABLE_MCP: "true"
      ENABLE_MEMORY: "false"
      CORS_ORIGINS: "*"
      CORS_CREDENTIALS: "false"
      APP_SECRETS_MASTER_KEY: "ci-smoke-test-only"
      # No LLM_API_KEY — chat routes stay disabled; CRUD-only is fine for smoke.

    steps:
      - name: Docs-only shortcut
        if: needs.changes.outputs.docs_only == 'true'
        run: 'echo "Docs-only PR: API smoke skipped by design."'

      - name: Checkout
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: needs.changes.outputs.docs_only != 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node
        if: needs.changes.outputs.docs_only != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        if: needs.changes.outputs.docs_only != 'true'
        run: pnpm install --frozen-lockfile

      - name: Start API server
        if: needs.changes.outputs.docs_only != 'true'
        run: |
          pnpm --filter @tavern/api exec tsx src/index.ts > api.log 2>&1 &
          echo "API_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for API health
        if: needs.changes.outputs.docs_only != 'true'
        run: |
          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:3000/health" > /dev/null; then
              echo "API is ready"
              exit 0
            fi
            sleep 1
          done

          echo "API did not become healthy within timeout"
          cat api.log || true
          exit 1

      - name: Run smoke tests
        if: needs.changes.outputs.docs_only != 'true'
        run: pnpm --filter @tavern/api smoke

      - name: Stop API server
        if: always() && needs.changes.outputs.docs_only != 'true'
        run: |
          if [ -n "${API_PID:-}" ]; then
            kill "$API_PID" || true
          fi

      - name: Print API logs on failure
        if: failure() && needs.changes.outputs.docs_only != 'true'
        run: cat api.log || true
