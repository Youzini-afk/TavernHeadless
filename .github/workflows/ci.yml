name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Test (shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test:ci -- --shard=${{ matrix.shard }}/3

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  coverage:
    name: Coverage
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - lint
      - typecheck
      - test
      - build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Coverage
        run: pnpm test:ci:coverage

  api-smoke:
    name: API Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PORT: "3000"
      AUTH_MODE: "off"
      ENABLE_SSE_CHAT: "true"
      ENABLE_PROMPT_DRY_RUN: "true"
      ENABLE_MCP: "true"
      ENABLE_MEMORY: "false"
      CORS_ORIGINS: "*"
      CORS_CREDENTIALS: "false"
      APP_SECRETS_MASTER_KEY: "ci-smoke-test-only"
      # No LLM_API_KEY — chat routes stay disabled; CRUD-only is fine for smoke.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Start API server
        run: |
          pnpm --filter @tavern/api exec tsx src/index.ts > api.log 2>&1 &
          echo "API_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for API health
        run: |
          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:3000/health" > /dev/null; then
              echo "API is ready"
              exit 0
            fi
            sleep 1
          done

          echo "API did not become healthy within timeout"
          cat api.log || true
          exit 1

      - name: Run smoke tests
        run: pnpm --filter @tavern/api smoke

      - name: Stop API server
        if: always()
        run: |
          if [ -n "${API_PID:-}" ]; then
            kill "$API_PID" || true
          fi

      - name: Print API logs on failure
        if: failure()
        run: cat api.log || true
